<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích Thời Tiết Theo Vùng Miền</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .chart-card {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            color: #0f172a;
            font-size: 24px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* Định dạng trục và lưới nền */
        .axis text {
            font-size: 12px;
            fill: #475569;
            font-weight: 500;
        }
        .axis path, .axis line { stroke: #cbd5e1; }
        .grid line { stroke: #e2e8f0; stroke-dasharray: 4; }
        .grid path { stroke: none; }

        /* Hiệu ứng tương tác Bong bóng */
        .bubble {
            cursor: pointer;
            transition: all 0.2s ease;
            stroke: #ffffff;
            stroke-width: 1px;
        }
        .bubble:hover {
            opacity: 1 !important;
            stroke: #0f172a;
            stroke-width: 2px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        /* Định dạng Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.1s ease;
        }
    </style>
</head>
<body>

    <div class="chart-card">
        <h2>Phân Tích Tương Quan Khí Hậu Vùng Miền</h2>
        <p class="subtitle">Biểu đồ thể hiện mối quan hệ giữa <strong>Nhiệt độ trung bình</strong> và <strong>Độ ẩm trung bình</strong>.<br>Độ lớn của bong bóng đại diện cho số lượng tỉnh/thành phố thuộc vùng đó.</p>
        
        <div id="bubble-chart"></div>
    </div>

    <div class="tooltip" id="chart-tooltip"></div>

    <script>
        // 1. THIẾT LẬP KÍCH THƯỚC KHUNG HÌNH
        const margin = { top: 20, right: 40, bottom: 60, left: 60 };
        const width = 850;
        const height = 500;
        
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;

        const svg = d3.select("#bubble-chart")
            .append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .append("g")
            .attr("transform", `translate(${margin.left}, ${margin.top})`);

        const tooltip = d3.select("#chart-tooltip");

        // 2. ĐỌC VÀ TIỀN XỬ LÝ DỮ LIỆU
        d3.csv("clean_weather_dataset.csv").then(rawData => {
            
            // Lọc dữ liệu duy nhất cho từng tỉnh
            const uniqueProvinces = new Map();
            rawData.forEach(d => {
                const province = d["location.name"];
                const region = d["location.region"];
                const temp = parseFloat(d["day.avgtemp_c"]);
                const hum = parseFloat(d["day.avghumidity"]);

                if (province && region && !isNaN(temp) && !isNaN(hum) && !uniqueProvinces.has(province)) {
                    uniqueProvinces.set(province, { region, temp, hum });
                }
            });
            const dataset = Array.from(uniqueProvinces.values());

            // Gom nhóm tính trung bình và đếm số lượng tỉnh theo vùng
            const regionData = Array.from(d3.rollups(dataset,
                v => ({
                    count: v.length,
                    avgTemp: d3.mean(v, d => d.temp),
                    avgHum: d3.mean(v, d => d.hum)
                }),
                d => d.region
            ), ([region, values]) => ({ region, ...values }));

            // 3. THIẾT LẬP CÁC THANG ĐO (SCALES)
            // Trục X: Nhiệt độ (Thêm buffer để bong bóng không dính lề)
            const xScale = d3.scaleLinear()
                .domain([d3.min(regionData, d => d.avgTemp) - 1.5, d3.max(regionData, d => d.avgTemp) + 1.5])
                .range([0, innerWidth]);

            // Trục Y: Độ ẩm
            const yScale = d3.scaleLinear()
                .domain([d3.min(regionData, d => d.avgHum) - 2, d3.max(regionData, d => d.avgHum) + 2])
                .range([innerHeight, 0]);

            // Bán kính R: Dùng scaleSqrt để diện tích tỷ lệ thuận với số lượng tỉnh
            const rScale = d3.scaleSqrt()
                .domain([0, d3.max(regionData, d => d.count)])
                .range([10, 45]);

            // Màu sắc: Gán màu riêng cho từng vùng
            const colorScale = d3.scaleOrdinal(d3.schemeSet2);

            // 4. VẼ LƯỚI NỀN (GRIDLINES)
            svg.append("g")
                .attr("class", "grid")
                .attr("transform", `translate(0, ${innerHeight})`)
                .call(d3.axisBottom(xScale).tickSize(-innerHeight).tickFormat(""));

            svg.append("g")
                .attr("class", "grid")
                .call(d3.axisLeft(yScale).tickSize(-innerWidth).tickFormat(""));

            // 5. VẼ CÁC TRỤC TỌA ĐỘ VÀ NHÃN
            svg.append("g")
                .attr("class", "axis")
                .attr("transform", `translate(0, ${innerHeight})`)
                .call(d3.axisBottom(xScale).ticks(8));

            svg.append("g")
                .attr("class", "axis")
                .call(d3.axisLeft(yScale).ticks(8));

            // Nhãn trục X
            svg.append("text")
                .attr("x", innerWidth / 2)
                .attr("y", innerHeight + 45)
                .style("text-anchor", "middle")
                .style("font-size", "13px")
                .style("font-weight", "600")
                .style("fill", "#475569")
                .text("Nhiệt độ trung bình (°C)");

            // Nhãn trục Y
            svg.append("text")
                .attr("transform", "rotate(-90)")
                .attr("x", -innerHeight / 2)
                .attr("y", -45)
                .style("text-anchor", "middle")
                .style("font-size", "13px")
                .style("font-weight", "600")
                .style("fill", "#475569")
                .text("Độ ẩm trung bình (%)");

            // 6. VẼ CÁC BONG BÓNG (BUBBLES) KÈM HIỆU ỨNG
            const bubbles = svg.selectAll(".bubble-group")
                .data(regionData)
                .enter()
                .append("g")
                .attr("class", "bubble-group");

            bubbles.append("circle")
                .attr("class", "bubble")
                .attr("cx", d => xScale(d.avgTemp))
                .attr("cy", d => yScale(d.avgHum))
                .attr("fill", d => colorScale(d.region))
                .style("opacity", 0.8)
                // Hiệu ứng mọc bong bóng từ điểm 0
                .attr("r", 0)
                .transition()
                .duration(1000)
                .ease(d3.easeElasticOut)
                .attr("r", d => rScale(d.count));

            // Thêm sự kiện Tooltip cho bong bóng
            svg.selectAll(".bubble")
                .on("mouseover", function(event, d) {
                    // Làm mờ các bong bóng khác
                    d3.selectAll(".bubble").style("opacity", 0.3);
                    d3.select(this).style("opacity", 1);

                    tooltip.style("opacity", 1)
                        .html(`
                            <div style="font-weight:bold; font-size:15px; margin-bottom:8px; color:#38bdf8;">${d.region}</div>
                            🏢 <strong>Số tỉnh thành:</strong> ${d.count}<br/>
                            🌡️ <strong>Nhiệt độ:</strong> ${d.avgTemp.toFixed(1)} °C<br/>
                            💧 <strong>Độ ẩm:</strong> ${d.avgHum.toFixed(1)} %
                        `);
                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 20) + "px")
                           .style("top", (event.pageY - 20) + "px");
                })
                .on("mouseout", function() {
                    d3.selectAll(".bubble").style("opacity", 0.8);
                    tooltip.style("opacity", 0);
                });

            // 7. THÊM NHÃN TÊN VÙNG VÀO TRUNG TÂM BONG BÓNG
            bubbles.append("text")
                .attr("x", d => xScale(d.avgTemp))
                .attr("y", d => yScale(d.avgHum))
                .style("text-anchor", "middle")
                .style("alignment-baseline", "middle")
                .style("font-size", "11px")
                .style("font-weight", "600")
                .style("fill", "#0f172a")
                .style("pointer-events", "none") // Giúp chuột không bị vướng khi trỏ vào chữ
                .style("opacity", 0)
                .text(d => d.region)
                .transition()
                .delay(800)
                .duration(500)
                .style("opacity", 1);

        }).catch(error => {
            console.error("Lỗi dữ liệu: ", error);
            d3.select("#bubble-chart").html("<p style='color:red;'>Lỗi tải file dữ liệu.</p>");
        });
    </script>
</body>
</html>
