<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - D3.js Project</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg: #0b1220;
            --card: rgba(255, 255, 255, 0.06);
            --cardBorder: rgba(255, 255, 255, 0.1);
            --text: rgba(255, 255, 255, 0.92);
            --accent: #7dd3fc;
            /* Blue */
            --accent2: #f87171;
            /* Red */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 10%, #1e293b, var(--bg));
            color: var(--text);
            padding: 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--cardBorder);
            padding-bottom: 15px;
        }

        .filter-section {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--cardBorder);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select {
            background: #1e293b;
            color: white;
            border: 1px solid var(--accent);
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .chart-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--cardBorder);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .detail-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--accent);
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--accent);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            font-size: 12px;
            z-index: 100;
        }

        .legend-text {
            font-size: 11px;
            fill: rgba(255, 255, 255, 0.8);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .legend-box {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .legend-container {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            justify-content: flex-end;
        }

        /* SVG Styles */
        .axis text {
            fill: rgba(255, 255, 255, 0.7);
            font-size: 11px;
        }

        .axis path,
        .axis line {
            stroke: rgba(255, 255, 255, 0.2);
        }

        .grid line {
            stroke: rgba(255, 255, 255, 0.05);
            stroke-dasharray: 4;
        }

        .line-temp {
            fill: none;
            stroke: var(--accent2);
            stroke-width: 3;
        }

        .line-uv {
            fill: none;
            stroke: var(--accent);
            stroke-width: 3;
        }

        .bar {
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .bar:hover {
            filter: brightness(1.2);
        }
    </style>
</head>

<body>

    <div class="dashboard-header">
        <div>
            <h1 style="margin:0; font-size: 1.8rem;">D3.js Weather Analysis</h1>
            <p style="color: #94a3b8; margin: 5px 0 0 0;">Đồ án Thực hành - Trực quan hóa dữ liệu thời tiết</p>
        </div>
        <div class="filter-section">
            <label>Chọn Vùng Miền:</label>
            <select id="regionSelect">
                <option value="All">Tất cả các vùng</option>
            </select>
        </div>
    </div>

    <div class="main-grid">
        <!-- Cột trái: Các biểu đồ chính -->
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="chart-card">
                <h2>Task 1: Phân bố nhiệt độ trung bình (Tháng 1 - 12)</h2>
                <div id="task1"></div>
            </div>

            <div class="chart-card">
                <h2>Task 10: Tương quan UV & Nhiệt độ (Theo tuần)</h2>
                <div id="task10"></div>
            </div>
        </div>

        <!-- Cột phải: Task 5 và Chi tiết -->
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="chart-card">
                <h2>Task 5: So sánh theo Địa hình</h2>
                <div id="task5"></div>
            </div>

            <div class="detail-card" id="detailPanel">
                <h3 style="color: var(--accent); margin-top:0;">Chi tiết điểm chọn</h3>
                <div id="detailContent">Click vào biểu đồ để xem chi tiết...</div>
            </div>
        </div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script src="script.js"></script>
</body>

</html>
