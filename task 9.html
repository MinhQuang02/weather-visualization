<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Sánh Khí Hậu Giữa Các Vùng Miền</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --color-temp: #f97316; /* Màu cam cho Nhiệt độ */
            --color-hum: #0ea5e9;  /* Màu xanh cho Độ ẩm */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .chart-card {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        h2 { margin-top: 0; margin-bottom: 8px; font-size: 24px; }
        p.subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 25px; }

        /* Nút chuyển đổi (Toggle Buttons) */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .toggle-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: #fff;
            color: var(--text-muted);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn:hover { background: #f1f5f9; }

        /* Trạng thái Active của nút */
        .toggle-btn.active-temp {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
        }
        
        .toggle-btn.active-hum {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
        }

        svg { width: 100%; height: auto; overflow: visible; }

        /* Định dạng trục */
        .axis text { font-size: 12px; fill: #475569; font-weight: 500; }
        .axis path, .axis line { stroke: #cbd5e1; }
        .y-axis path, .y-axis line { stroke: none; } /* Ẩn đường kẻ dọc của trục Y */

        /* Lưới nền */
        .grid line { stroke: #f1f5f9; }
        .grid path { stroke: none; }

        /* Hiệu ứng Cột */
        .bar { transition: fill 0.3s ease; }
        .bar:hover { opacity: 0.85; }

    </style>
</head>
<body>

    <div class="chart-card">
        <h2>So Sánh Khí Hậu Giữa Các Vùng Miền</h2>
        <p class="subtitle">Dữ liệu thô đã được gom cụm và tính trung bình. Hãy bấm nút để chuyển đổi góc nhìn.</p>
        
        <div class="controls">
            <button id="btn-temp" class="toggle-btn active-temp">Nhiệt Độ Trung Bình</button>
            <button id="btn-hum" class="toggle-btn">Độ Ẩm Trung Bình</button>
        </div>

        <div id="compare-chart"></div>
    </div>

    <script>
        // 1. THIẾT LẬP KÍCH THƯỚC KHUNG HÌNH
        const margin = { top: 20, right: 60, bottom: 50, left: 220 };
        const width = 850;
        const height = 450;
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;

        const svg = d3.select("#compare-chart")
            .append("svg")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .append("g")
            .attr("transform", `translate(${margin.left}, ${margin.top})`);

        // Các biến toàn cục lưu trữ dữ liệu và trạng thái hiện tại
        let regionalData = [];
        let currentMetric = 'temp'; // 'temp' hoặc 'hum'

        // Khởi tạo các nhóm SVG tĩnh
        const gridGroup = svg.append("g").attr("class", "grid").attr("transform", `translate(0, ${innerHeight})`);
        const xAxisGroup = svg.append("g").attr("class", "axis x-axis").attr("transform", `translate(0, ${innerHeight})`);
        const yAxisGroup = svg.append("g").attr("class", "axis y-axis");
        const xAxisLabel = svg.append("text")
            .attr("x", innerWidth / 2)
            .attr("y", innerHeight + 40)
            .style("text-anchor", "middle")
            .style("font-size", "13px")
            .style("font-weight", "600")
            .style("fill", "#475569");

        // 2. TẢI VÀ XỬ LÝ DỮ LIỆU
        d3.csv("clean_weather_dataset.csv").then(rawData => {
            
            // Lấy 1 bản ghi duy nhất cho mỗi tỉnh
            const uniqueProvinces = new Map();
            rawData.forEach(d => {
                const province = d["location.name"];
                const region = d["location.region"];
                const temp = parseFloat(d["day.avgtemp_c"]);
                const hum = parseFloat(d["day.avghumidity"]);

                if (province && region && !isNaN(temp) && !isNaN(hum) && !uniqueProvinces.has(province)) {
                    uniqueProvinces.set(province, { region, temp, hum });
                }
            });

            // Gom nhóm tính trung bình theo vùng
            regionalData = Array.from(d3.rollups(Array.from(uniqueProvinces.values()),
                v => ({
                    temp: d3.mean(v, d => d.temp),
                    hum: d3.mean(v, d => d.hum)
                }),
                d => d.region
            ), ([region, values]) => ({ region, ...values }));

            // Vẽ biểu đồ lần đầu tiên
            updateChart('temp');

        }).catch(error => console.error("Lỗi dữ liệu: ", error));

        // 3. HÀM CẬP NHẬT BIỂU ĐỒ (UPDATE PATTERN)
        function updateChart(metric) {
            currentMetric = metric;
            const t = d3.transition().duration(800).ease(d3.easeCubicOut);

            // Sắp xếp dữ liệu giảm dần theo chỉ số hiện tại
            regionalData.sort((a, b) => b[metric] - a[metric]);

            // Cập nhật Thang đo (Scales)
            const maxVal = d3.max(regionalData, d => d[metric]);
            const xScale = d3.scaleLinear()
                .domain([0, maxVal * 1.15]) // Thêm 15% khoảng trống bên phải cho nhãn số
                .nice()
                .range([0, innerWidth]);

            const yScale = d3.scaleBand()
                .domain(regionalData.map(d => d.region))
                .range([0, innerHeight])
                .padding(0.3); // Khoảng cách giữa các cột

            // Cập nhật Lưới và Trục
            gridGroup.transition(t).call(d3.axisBottom(xScale).tickSize(-innerHeight).tickFormat("").ticks(6));
            xAxisGroup.transition(t).call(d3.axisBottom(xScale).ticks(6));
            yAxisGroup.transition(t).call(d3.axisLeft(yScale));

            // Cập nhật Nhãn trục X
            xAxisLabel.text(metric === 'temp' ? "Nhiệt độ trung bình (°C)" : "Độ ẩm trung bình (%)");

            // Chọn màu sắc theo metric
            const barColor = metric === 'temp' ? "var(--color-temp)" : "var(--color-hum)";
            const unit = metric === 'temp' ? "°C" : "%";

            // BIND DỮ LIỆU VÀO CỘT (Data Join)
            const bars = svg.selectAll(".bar").data(regionalData, d => d.region);

            bars.join(
                enter => enter.append("rect")
                    .attr("class", "bar")
                    .attr("y", d => yScale(d.region))
                    .attr("x", 0)
                    .attr("height", yScale.bandwidth())
                    .attr("width", 0) // Bắt đầu từ 0 để có hiệu ứng mọc ra
                    .attr("fill", barColor)
                    .call(enter => enter.transition(t)
                        .attr("width", d => xScale(d[metric]))
                    ),
                update => update.call(update => update.transition(t)
                    .attr("y", d => yScale(d.region))
                    .attr("width", d => xScale(d[metric]))
                    .attr("height", yScale.bandwidth())
                    .attr("fill", barColor)
                ),
                exit => exit.call(exit => exit.transition(t)
                    .attr("width", 0)
                    .remove()
                )
            );

            // BIND DỮ LIỆU VÀO NHÃN SỐ (Data Labels)
            const labels = svg.selectAll(".data-label").data(regionalData, d => d.region);

            labels.join(
                enter => enter.append("text")
                    .attr("class", "data-label")
                    .attr("y", d => yScale(d.region) + yScale.bandwidth() / 2)
                    .attr("x", 0)
                    .attr("dy", "0.35em")
                    .style("font-size", "12px")
                    .style("font-weight", "700")
                    .style("fill", "#0f172a")
                    .text(d => d[metric].toFixed(1) + unit)
                    .style("opacity", 0)
                    .call(enter => enter.transition(t)
                        .attr("x", d => xScale(d[metric]) + 8)
                        .style("opacity", 1)
                    ),
                update => update.call(update => update.transition(t)
                    .attr("y", d => yScale(d.region) + yScale.bandwidth() / 2)
                    .attr("x", d => xScale(d[metric]) + 8)
                    .text(d => d[metric].toFixed(1) + unit)
                ),
                exit => exit.call(exit => exit.transition(t)
                    .style("opacity", 0)
                    .remove()
                )
            );
        }

        // 4. XỬ LÝ SỰ KIỆN BẤM NÚT (TOGGLE)
        const btnTemp = document.getElementById('btn-temp');
        const btnHum = document.getElementById('btn-hum');

        btnTemp.addEventListener('click', () => {
            if (currentMetric === 'temp') return;
            btnTemp.classList.add('active-temp');
            btnHum.classList.remove('active-hum');
            btnHum.style.background = "#fff";
            btnHum.style.color = "var(--text-muted)";
            updateChart('temp');
        });

        btnHum.addEventListener('click', () => {
            if (currentMetric === 'hum') return;
            btnHum.classList.add('active-hum');
            btnTemp.classList.remove('active-temp');
            btnTemp.style.background = "#fff";
            btnTemp.style.color = "var(--text-muted)";
            updateChart('hum');
        });

    </script>
</body>
</html>
